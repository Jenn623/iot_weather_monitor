server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA — todas las rutas van a index.html ──────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Proxy REST al backend ─────────────────────────────────
    # El frontend llama a /api/* y nginx lo reenvía al backend.
    # Así el navegador nunca habla directamente con el backend.
    location /api/ {
        proxy_pass         http://iot-backend-service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ── Proxy WebSocket al backend ────────────────────────────
    location /ws {
        proxy_pass         http://iot-backend-service:8000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Caché para assets estáticos de Vite ──────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
    }
}