; ── Configuración de PlatformIO ──────────────────────────────
; Proyecto: IoT Monitor — ESP32 + DHT22
; Materia:  Sistemas Distribuidos

[env:esp32dev]
platform  = espressif32
board     = esp32dev        ; <-- cambia de esp32cam a esp32dev
framework = arduino

monitor_speed = 115200
upload_speed  = 921600      ; velocidad alta, funciona sin problemas

lib_deps =
    adafruit/DHT sensor library @ ^1.4.6
    adafruit/Adafruit Unified Sensor @ ^1.1.14

build_flags =
    -DCORE_DEBUG_LEVEL=0