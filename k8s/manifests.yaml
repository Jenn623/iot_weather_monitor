# =============================================================
# BACKEND — FastAPI
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-backend
  labels:
    app: iot-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-backend
  template:
    metadata:
      labels:
        app: iot-backend
    spec:
      containers:
        - name: backend
          image: iot-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          # Variables de entorno del contenedor
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          # Verifica que el pod esté listo antes de recibir tráfico
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          # Reinicia el pod si el proceso muere
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              memory: "64Mi"
              cpu:    "100m"
            limits:
              memory: "256Mi"
              cpu:    "500m"

---
# Service interno del backend
# Solo accesible dentro del clúster (ClusterIP)
# El frontend y el ESP32 lo alcanzan por nombre: iot-backend-service:8000
apiVersion: v1
kind: Service
metadata:
  name: iot-backend-service
spec:
  selector:
    app: iot-backend
  ports:
    - name:       http
      port:       8000
      targetPort: 8000
  type: ClusterIP

---
# =============================================================
# FRONTEND — React + Nginx
# =============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iot-frontend
  labels:
    app: iot-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: iot-frontend
  template:
    metadata:
      labels:
        app: iot-frontend
    spec:
      containers:
        - name: frontend
          image: iot-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "32Mi"
              cpu:    "50m"
            limits:
              memory: "128Mi"
              cpu:    "200m"

---
# Service del frontend
# LoadBalancer expone el dashboard con IP externa accesible en la red local
apiVersion: v1
kind: Service
metadata:
  name: iot-frontend-service
spec:
  selector:
    app: iot-frontend
  ports:
    - name:       http
      port:       80
      targetPort: 80
  type: LoadBalancer